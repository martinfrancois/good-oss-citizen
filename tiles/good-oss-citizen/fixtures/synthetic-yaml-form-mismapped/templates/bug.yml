name: Bug report
description: Report a defect in the library so we can investigate.
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Library version
      description: The exact released version you observed the bug on.
      placeholder: e.g. 2.4.1
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the unexpected behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps a maintainer can run end-to-end.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: shell
    validations:
      required: false
