name: Smoke tests

permissions:
  contents: read
  issues: read
  pull-requests: read

on:
  pull_request:
    branches:
      - main
    paths:
      - 'tiles/good-oss-citizen/skills/recon/scripts/bash/**'
      - 'tiles/good-oss-citizen/evals/**'
      - 'tiles/good-oss-citizen/rules/**'
      - 'tiles/good-oss-citizen/skills/**'
      - 'tests/**'
      - '.github/workflows/test.yml'
  push:
    branches:
      - main
    paths:
      - 'tiles/good-oss-citizen/skills/recon/scripts/bash/**'
      - 'tiles/good-oss-citizen/evals/**'
      - 'tiles/good-oss-citizen/rules/**'
      - 'tiles/good-oss-citizen/skills/**'
      - 'tests/**'
      - '.github/workflows/test.yml'

jobs:
  github-sh-envelope:
    name: github.sh JSON envelope
    runs-on: ubuntu-latest
    env:
      # Authenticated rate limit so the 23-command sweep doesn't trip
      # the 60-req/hr unauthenticated limit.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Run template compliance static guards
        run: python3 tests/test_template_compliance_static.py
      - name: Run envelope smoke test
        # Pin every fixture explicitly so the CI run is deterministic per
        # `rules/testing-standards.md`. No auto-discovery — auto-discovery
        # is reserved for manual probing against arbitrary repos. issue 13
        # is this migration's tracking issue; PR 12 is the previous merged
        # PR; README.md is the default-branch readme. None of these will
        # be deleted from this repo.
        run: |
          python3 tests/test_github_sh_envelope.py \
            --repo tesslio/good-oss-citizen \
            --issue-number 13 \
            --pr-number 12 \
            --file-path README.md
