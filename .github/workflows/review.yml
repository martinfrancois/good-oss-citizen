name: Review Skills

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches:
      - main
    paths:
      - 'tiles/**/SKILL.md'

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: tesslio/skill-review@main
        with:
          path: tiles/good-oss-citizen
          fail-threshold: 85
