name: Review Skills

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches:
      - main
    paths:
      - 'tiles/**/SKILL.md'

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Tessl CLI
        uses: tesslio/setup-tessl@v2
        with:
          # Explicit version pin — `version: latest` resolves via
          # `https://install.tessl.io/scripts/latest.sh` which returns
          # empty content from some GitHub Actions runners (reproduced
          # twice). Pin until upstream setup-tessl exposes a more
          # reliable resolution mechanism or the install endpoint stops
          # serving empty bodies.
          version: "0.77.0"
          token: ${{ secrets.TESSL_TOKEN }}

      # Per `rules/context-artifacts.md` (Mandatory Review) — every skill
      # gets an explicit `tessl skill review --threshold 85` step so the
      # gate is visible at the workflow level, not implicit in a loop.
      # Adding a new skill = add a step here.
      - name: Review skill — recon
        run: tessl skill review --threshold 85 tiles/good-oss-citizen/skills/recon/SKILL.md
      - name: Review skill — propose
        run: tessl skill review --threshold 85 tiles/good-oss-citizen/skills/propose/SKILL.md
      - name: Review skill — preflight
        run: tessl skill review --threshold 85 tiles/good-oss-citizen/skills/preflight/SKILL.md
      - name: Review skill — triage
        run: tessl skill review --threshold 85 tiles/good-oss-citizen/skills/triage/SKILL.md
